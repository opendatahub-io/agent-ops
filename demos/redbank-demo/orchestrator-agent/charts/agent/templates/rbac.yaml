{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agent.fullname" . }}-agentcard-reader
  labels:
    {{- include "agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["agent.kagenti.dev"]
    resources: ["agentcards"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agent.fullname" . }}-agentcard-reader
  labels:
    {{- include "agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agent.fullname" . }}-agentcard-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
