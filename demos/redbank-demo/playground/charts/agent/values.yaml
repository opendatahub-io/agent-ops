# Default values for the playground UI

replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

env: {}
  # ORCHESTRATOR_URL is set via per-deployment values.yaml

extraLabels: {}

# ServiceAccount — not required for the playground (no K8s API access)
serviceAccount:
  create: false
  name: ""

# No RBAC needed — the playground doesn't access K8s APIs
rbac:
  create: false

# No secrets needed by default — playground has no API keys
secrets:
  apiKey: ""
  postgresPassword: ""
  mlflowTrackingToken: ""

service:
  port: 8080
  type: ClusterIP

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# OpenShift Route — enabled by default
openshift:
  route:
    enabled: true
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

# Vanilla K8s Ingress — opt-in
ingress:
  enabled: false
  className: ""
  host: ""
  tls: []

healthCheck:
  path: /health
  livenessInitialDelay: 5
  livenessPeriod: 60
  livenessTimeout: 3
  readinessInitialDelay: 3
  readinessPeriod: 15
  readinessTimeout: 3

volumes: []
volumeMounts: []

extraSecrets: {}
